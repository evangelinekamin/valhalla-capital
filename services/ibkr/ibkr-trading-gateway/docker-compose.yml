services:
  # IB Gateway (gnzsnz/ib-gateway - actively maintained)
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: ib-gateway
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      VNC_SERVER_PASSWORD: ${VNC_PASSWORD:-}
      TWS_ACCEPT_INCOMING: accept
      READ_ONLY_API: "no"
    ports:
      - "4001:4001"  # Live trading API port
      - "4002:4002"  # Paper trading API port
      - "5900:5900"  # VNC for monitoring
    volumes:
      - ib-gateway-settings:/root/Jts
    networks:
      - trading-network
    healthcheck:
      # 0FA1=4001(live), 0FA2=4002(paper) - check for either
      test: ["CMD", "sh", "-c", "grep -qE '0FA1|0FA2' /proc/net/tcp"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # PostgreSQL + TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: trading
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - trading-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Trading Service
  trading-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trading-service
    restart: unless-stopped
    depends_on:
      ib-gateway:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      IBKR_HOST: ib-gateway
      IBKR_PORT: ${IBKR_SOCAT_PORT:-4003}  # socat proxy: 4003=live, 4004=paper
      IBKR_CLIENT_ID: "1"
      TRADING_MODE: ${TRADING_MODE:-paper}
      DATABASE_URL: postgresql://trading:${POSTGRES_PASSWORD}@postgres:5432/trading
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      MAX_POSITION_FRACTION: "0.20"
      MAX_DAILY_LOSS_PCT: "0.03"
      MIN_POSITION_SIZE_USD: "30"
      MAX_POSITION_SIZE_USD: "2000"
      MAX_TRADES_PER_DAY: "10"
      MAX_TRADES_PER_WEEK: "30"
      INITIAL_PORTFOLIO_VALUE: ${INITIAL_PORTFOLIO_VALUE:-500}
      DRY_RUN_MODE: ${DRY_RUN_MODE:-true}
    volumes:
      - ./shared:/shared
      - trading-data:/app/data
    networks:
      - trading-network
    healthcheck:
      test: ["CMD", "python", "/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ib-gateway-settings:
    driver: local
  postgres-data:
    driver: local
  trading-data:
    driver: local

networks:
  trading-network:
    driver: bridge
