[Server]
address = "0.0.0.0"
port = 8080
https = false  # Set to true if behind HTTPS reverse proxy
httpMaxConnections = 100
staticDir = "./public"
title = "Nitter"
hostname = "localhost"  # Change to your domain in production

[Cache]
listMinutes = 240  # How long to cache list info
rssMinutes = 30    # How long to cache RSS queries
redisHost = "nitter-redis"  # This matches the service name in docker-compose
redisPort = 6379
redisPassword = ""
redisConnections = 20
redisMaxConnections = 30

[Config]
hmacKey = "<REDACTED>"
base64Media = false
tokenCount = 2
# Note: As of 2024, Nitter requires Twitter session tokens to function
# You'll need to create a sessions.jsonl file with valid tokens
# See: https://github.com/zedeus/nitter/wiki/Creating-session-tokens

[Preferences]
theme = "Nitter"
replaceTwitter = ""
replaceYouTube = ""
replaceReddit = ""
replaceInstagram = ""
proxyVideos = true
hlsPlayback = false
infiniteScroll = false
